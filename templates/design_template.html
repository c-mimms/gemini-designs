<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Designs</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: #151518;
            --accent: #6366f1;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.7;
            padding: 4rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        h1,
        h2,
        h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        pre {
            background: #1e1e24;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <a href="../" class="back-link">← Back to Portfolio</a>
    <h1>{{title}}</h1>
    <div class="content">
        {{content}}
    </div>
</body>

</html>
